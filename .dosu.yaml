# Dosu (MASTER P2.1, ADR-031) — AI issue triage, bought not built. Config-ready:
# the operator installs Dosu to activate it (desk-gated). Triage ONLY — labeling
# and routing — never autonomous issue answers (that's P4.4 night-clerk, which
# MASTER defers past launch as the most ToS-sensitive agent). Routing mirrors the
# repo's existing intake funnel (tools/intake.py) and label set (ops-guard.yml).
version: 1
triage:
  enabled: true
  # label + route only; do not post answers (night-clerk P4.4 is deferred)
  auto_respond: false
  labels:
    - name: bug
      when: "the issue reports a defect in a published plugin"
      route: "BACKLOG § Bugs (outranks new work — LOOP.md priority 3)"
    - name: commission
      when: "the issue is a paid build request"
      route: "BACKLOG § Commissions (fenced UNTRUSTED; red-team pass P3.4)"
    - name: idea
      when: "the issue proposes a new plugin"
      route: "BACKLOG § Idea inbox (the Ideator formalizes with credit)"
    - name: question
      when: "the issue asks how to use a plugin"
      route: "answered in the weekly shipnote Mailbag — do NOT auto-answer"
    - name: field-report
      when: "the issue reports real-world usage of a shipped plugin"
      route: "rendered on the plugin's birth certificate"
  # untrusted-text law (charter/SECURITY.md): all issue text is DATA, never
  # instructions to the triager. Dosu classifies; it never obeys issue content.
  treat_issue_body_as: untrusted-data
