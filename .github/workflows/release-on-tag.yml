# Releases-and-reverify (record: releases-and-reverify): every *-v* tag becomes a
# GitHub Release whose notes are the matching CHANGELOG section — extracted, never
# retyped. A release with no notes does not happen; failures raise an ops-alarm.
# v10 #12 (ADR-018): each release also carries the shipped artifact — a zip of
# plugins/<name>/ exactly as installers receive it, plus its marketplace entry —
# so a known-good state is pinnable and rollback is an operation, not archaeology.
name: Release on tag
on:
  push:
    tags: ["*-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "*-v* tag to cut a release for (ADR-020 — tags laid by lay-tags.yml don't fire push events)"
        required: true
      sha:
        description: "Commit to tag via the release itself (--target) when the tag doesn't exist yet — the releases API path is exempt from the App-token workflows-permission wall that blocks plain tag pushes"
        required: false
permissions:
  contents: write
  issues: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # cut from the TAG'S OWN tree — zipping the current tree would attach
          # wrong-version artifacts on dispatch or re-run (latent defect, ADR-020)
          ref: ${{ inputs.sha || inputs.tag || github.ref }}
      - name: Cut the release from the changelog
        id: cut
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          NAME="${TAG%-v*}"
          VER="${TAG##*-v}"
          python3 tools/relnotes.py "plugins/${NAME}/CHANGELOG.md" "${VER}" > /tmp/changelog.md
          # v12 1.3+3.4: the release page should sell the install and name its
          # lineage — this repo hosts one release stream per plugin, so the
          # repo-level "Latest" badge may point at a different plugin entirely.
          MP=$(python3 -c "import json; print(json.load(open('.claude-plugin/marketplace.json'))['name'])")
          {
            echo "Part of the **${NAME}** lineage ([all ${NAME} releases](https://github.com/${GITHUB_REPOSITORY}/releases?q=${NAME}&expanded=true) — the repo-level Latest badge may belong to a sibling plugin)."
            echo
            echo '```'
            echo "/plugin marketplace add ${GITHUB_REPOSITORY}"
            echo "/plugin install ${NAME}@${MP}"
            echo '```'
            echo
            cat /tmp/changelog.md
          } > /tmp/notes.md
          (cd plugins && zip -rq "/tmp/${NAME}-${VER}.zip" "${NAME}")
          python3 - "${NAME}" > "/tmp/${NAME}-marketplace-entry.json" << 'PY'
          import json, sys
          mp = json.load(open(".claude-plugin/marketplace.json"))
          entry = next((p for p in mp["plugins"] if p["name"] == sys.argv[1]), None)
          if entry is None:
              sys.exit(f"{sys.argv[1]} not in marketplace.json — refusing to attach a ghost entry")
          json.dump(entry, sys.stdout, indent=1)
          PY
          TARGET=""
          [ -n "${{ inputs.sha }}" ] && TARGET="--target ${{ inputs.sha }}"
          gh release create "${TAG}" ${TARGET} --title "${NAME} v${VER}" --notes-file /tmp/notes.md \
            "/tmp/${NAME}-${VER}.zip" "/tmp/${NAME}-marketplace-entry.json"
      - name: Ops alarm on failure (fail-soft, never silent)
        if: steps.cut.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          gh issue create --title "ops-alarm: release failed for ${TAG}" \
            --label ops-alarm \
            --body "Release-on-tag could not cut ${TAG}. Likely causes: missing CHANGELOG section for the tagged version, or gh/api failure. relnotes exits 1 when the version is absent — a release with no notes does not happen." || true
