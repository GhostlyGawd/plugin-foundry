# Model execution is intentionally unavailable in GitHub Actions (ADR-032).
# This workflow is also disabled in repository settings. The inert definition is
# retained so a future settings toggle cannot silently restore a model call.
name: Run shift
on:
  workflow_dispatch:
permissions: {}

jobs:
  paused:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Model shifts are paused; use a live interactive session."
