# The factory shift: intake bugs+commissions, snapshot metrics, check the budget
# governor, run N loop iterations headlessly, then land the work — directly on main
# (default) or as a pull request (mode: pr — the human-veto experiment, ADR-008;
# merging the PR is the approval). Each landing on main → deploy-site.yml → the
# window updates. Requires secret CLAUDE_CODE_OAUTH_TOKEN (a Claude subscription
# token from `claude setup-token`; an API key would take precedence if both were
# set, so only the subscription secret is wired). Optional Actions *variable*
# LOOP_MONTHLY_BUDGET_USD caps monthly spend. A STOP file halts shifts safely.
name: Run shift
on:
  schedule:
    - cron: "17 */8 * * *"   # three shifts a day; tune to your credit budget
  workflow_dispatch:
    inputs:
      iterations:
        description: "Loop iterations this shift"
        default: "3"
      mode:
        description: "Land work directly or via pull request (veto window)"
        type: choice
        options: [direct, pr]
        default: direct
permissions:
  contents: write
  issues: write
  pull-requests: write
concurrency:
  group: shift
  cancel-in-progress: false
jobs:
  shift:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Intake (bugs + commissions -> BACKLOG, fenced as untrusted)
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 tools/intake.py
      - name: Metrics snapshot (stars, traffic, votes -> METRICS.jsonl)
        env:
          GH_TOKEN: ${{ github.token }}
          GOATCOUNTER_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
        run: python3 tools/metrics.py
      - name: Branch for PR mode
        if: ${{ github.event.inputs.mode == 'pr' }}
        run: git checkout -b "shift/${{ github.run_id }}"
      - name: Quota governor v2 (P0.6, ADR-028 — subscription window pressure)
        env:
          QUOTA_WEEKLY_RUNS: ${{ vars.QUOTA_WEEKLY_RUNS }}
          LOOP_MONTHLY_BUDGET_USD: ${{ vars.LOOP_MONTHLY_BUDGET_USD }}
        run: |
          # product tier: sheds only at the kill switch (pressure >= 1.0), which
          # queues a desk item. A shed shift still lands intake+metrics below.
          if python3 tools/quota.py check --agent foundry-loop; then
            python3 tools/quota.py record --agent foundry-loop
          else
            echo "QUOTA_SKIP=1" >> "$GITHUB_ENV"
            echo "quota: shift sheds — intake/metrics still land, loop skipped"
          fi
      - name: Install Claude Code
        if: env.QUOTA_SKIP != '1'
        run: npm install -g "@anthropic-ai/claude-code@$(cat .claude-code-version)"
      - name: Run the loop (governor-gated, cost-ledgered)
        if: env.QUOTA_SKIP != '1'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          LOOP_MONTHLY_BUDGET_USD: ${{ vars.LOOP_MONTHLY_BUDGET_USD }}
          CI: "true"
        run: ./loop.sh "${{ github.event.inputs.iterations || '3' }}"
      - name: Surface loop errors (diagnostic — token/auth debugging)
        if: always()
        continue-on-error: true
        run: |
          # loop.sh is fail-soft and, in CI/JSON mode, writes claude's error to
          # <log>.json (stdout) while printing only <log>.err (stderr) — so an
          # auth failure (a rejected CLAUDE_CODE_OAUTH_TOKEN) leaves no trace in
          # this log. Surface both, capped; GitHub masks registered secrets. No
          # run logs -> silent no-op.
          shopt -s nullglob
          found=0
          for f in state/runs/*.err state/runs/*.json; do
            [ -s "$f" ] || continue
            found=1
            echo "::group::${f}"
            tail -c 4000 "$f"
            echo
            echo "::endgroup::"
          done
          [ "$found" = 1 ] || echo "no state/runs/* logs this shift"
      - name: Land the work
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "foundry-loop"
          git config user.email "foundry-loop@users.noreply.github.com"
          if [ "${{ github.event.inputs.mode }}" = "pr" ]; then
            git push -u origin "shift/${{ github.run_id }}"
            gh pr create --fill --title "shift ${{ github.run_id }}: $(git log -1 --pretty=%s)" \
              --body "Autonomous shift landed as a PR (veto-window experiment, ADR-008). Merging = approval; closing = veto with a note, please."
          else
            git push
            git push --tags
          fi
      - name: Shift-zero feedback (v12 3.1, ADR-021 — fail-soft, fires once)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # If the ops-golive checklist still shows the first-shift box unticked,
          # tick it and announce Gate A's clock — the operator learns the factory
          # started without opening the Actions tab. No issue -> silent no-op.
          NUM=$(gh issue list --label ops-golive --state open --json number --jq '.[0].number' || true)
          [ -z "${NUM}" ] || [ "${NUM}" = "null" ] && exit 0
          BODY=$(gh issue view "${NUM}" --json body --jq .body)
          MARK='- [ ] Actions tab'
          case "${BODY}" in
            *"${MARK}"*)
              printf '%s' "${BODY}" | sed 's/- \[ \] Actions tab/- [x] Actions tab/' > /tmp/golive.md
              gh issue edit "${NUM}" --body-file /tmp/golive.md
              gh issue comment "${NUM}" --body "First shift complete — METRICS.jsonl and the ledger are arming, and Gate A's 14-day clock is running (ROADMAP.md). The factory works nights now."
              ;;
          esac
      - name: Traveler pings (guarded, fail-soft)
        if: env.PINGS_ENABLED == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 tools/pings.py --send
