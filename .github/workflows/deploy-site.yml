# Deploys the living window: every push rebuilds site/ and ships it to GitHub Pages.
# Because the shift workflow pushes after each run, the public site updates
# precisely because the AI worked. Enable Pages with source = "GitHub Actions".
name: Deploy site
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Gates + build
        run: |
          python3 tools/validate.py
          python3 tools/build.py
      - name: Visual-regression narration (P4.3 — always; screenshots best-effort)
        continue-on-error: true
        run: |
          python3 tools/vishot.py narrate
          python3 tools/vishot.py shoot || echo "vishot: capture skipped (no browser) — narration stands"
      - uses: actions/configure-pages@v6
        with:
          # ADR-020: the first deploy CREATES the Pages site (source: Actions)
          # if it doesn't exist yet — replaces click-list item 1
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
