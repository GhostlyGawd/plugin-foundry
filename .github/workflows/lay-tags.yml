# Lay pending release tags (ADR-020): sessions can't push tags (branch-scoped
# proxy), so this dispatch-only workflow recreates the annotated tags listed in
# state/TAGS-PENDING.json. Skip-if-exists, never forced — an existing remote tag
# always wins.
name: Lay pending tags
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  lay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0   # the tagged SHAs live in history — a shallow clone can't tag them
      - name: Recreate pending annotated tags
        run: |
          git config user.name foundry-ops
          git config user.email foundry-ops@users.noreply.github.com
          laid=0; skipped=0
          while IFS=$'\x1f' read -r tag sha msg; do
            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" > /dev/null 2>&1; then
              echo "skip: ${tag} already on the remote"; skipped=$((skipped+1)); continue
            fi
            git tag -a "${tag}" "${sha}" -m "${msg}"
            git push origin "refs/tags/${tag}"
            echo "laid: ${tag} -> ${sha}"; laid=$((laid+1))
          done < <(python3 -c "
          import json
          for t in json.load(open('state/TAGS-PENDING.json'))['tags']:
              print(t['tag'], t['sha'], t['message'], sep='\x1f')")
          echo "lay-tags: ${laid} laid, ${skipped} skipped" >> "$GITHUB_STEP_SUMMARY"
