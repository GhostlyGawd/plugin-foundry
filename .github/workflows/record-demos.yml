# Model execution is intentionally unavailable in GitHub Actions (ADR-032).
# Demo refreshes may be performed and reviewed from an attended interactive session.
name: Record demo transcripts
on:
  workflow_dispatch:
permissions: {}

jobs:
  paused:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Model demo recording is paused; use a live interactive session."
