# The chief of staff (MASTER P0.7, ADR-026): collects agent changesets from
# foundry/agents/outbox/, resolves by precedence, runs guard + gates, and opens
# attributed commits as a PR. Nothing in this workflow writes to main directly.
# Shares the `shift` concurrency group so orchestrate and run-shift cannot race.
# Deterministic python — runs even while the loop is token-paused.
name: Orchestrate
on:
  schedule:
    - cron: "23 6 * * *"   # daily desk/outbox sweep; cheap when empty
  workflow_dispatch:
permissions: {}
concurrency:
  group: shift
  cancel-in-progress: false
jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Branch for the proposed landing
        run: git checkout -b "orchestrate/${{ github.run_id }}"
      - name: Run the orchestrator (collect → order → guard → gates → land)
        run: python3 tools/orchestrator.py run --mode pr
      - name: Sync the owner's desk (one pinned issue — ADR-029)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 tools/desk.py sync
      - name: Push the landings
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # nothing to push is a healthy quiet day
          if [ -z "$(git log origin/${{ github.ref_name }}..HEAD --oneline 2>/dev/null || git log --oneline -0)" ] \
             && git diff --quiet HEAD origin/${{ github.ref_name }} 2>/dev/null; then
            echo "orchestrate: nothing landed — no push"
            exit 0
          fi
          branch="orchestrate/${{ github.run_id }}"
          git push -u origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "orchestrate ${{ github.run_id }}: $(git log -1 --pretty=%s)" \
            --body "Orchestrated agent landings. Gates run again on this PR; merging is approval and closing is veto."
