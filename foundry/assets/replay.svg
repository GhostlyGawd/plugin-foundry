<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" font-family="ui-monospace,Menlo,monospace" role="img" aria-label="Replay of real foundry iterations i89-i93: the review gate blocks a bad build, the fix ships with a pinned regression."><rect width="720" height="200" rx="12" fill="#f6efe2"/><rect width="720" height="200" rx="12" fill="none" stroke="#d9c9a8" stroke-width="2"/><circle cx="24" cy="24" r="5" fill="#a33327"/><circle cx="42" cy="24" r="5" fill="#c9a227"/><circle cx="60" cy="24" r="5" fill="#2e6b34"/><text x="80" y="29" font-size="13" fill="#6b5d49">nightshift foundry · one plugin, walked down the line</text><g opacity="0"><animate attributeName="opacity" dur="18.2s" repeatCount="indefinite" calcMode="discrete" keyTimes="0;0.0000;0.1429" values="1;1;0"/><rect x="24" y="52" rx="6" width="146" height="24" fill="#8a6d3b"/><text x="37" y="69" font-family="ui-monospace,Menlo,monospace" font-size="12.5" font-weight="bold" fill="#f6efe2">SHIFT — ideator</text><text x="34" y="96" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#221c14">starter-kits — curated bundles of shelf plugins,</text><text x="34" y="120" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#221c14">one copy-block installs the whole kit</text></g><g opacity="0"><animate attributeName="opacity" dur="18.2s" repeatCount="indefinite" calcMode="discrete" keyTimes="0;0.1429;0.2857" values="0;1;0"/><rect x="24" y="52" rx="6" width="146" height="24" fill="#8a6d3b"/><text x="37" y="69" font-family="ui-monospace,Menlo,monospace" font-size="12.5" font-weight="bold" fill="#f6efe2">BUILD — builder</text><text x="34" y="96" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#221c14">kit rail built: renderKits() —</text><text x="34" y="120" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#221c14">only PUBLISHED members emit install lines;</text><text x="34" y="144" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#221c14">pending ones say “finishing on the line”</text></g><g opacity="0"><animate attributeName="opacity" dur="18.2s" repeatCount="indefinite" calcMode="discrete" keyTimes="0;0.2857;0.4286" values="0;1;0"/><rect x="24" y="52" rx="6" width="186" height="24" fill="#2e6b34"/><text x="37" y="69" font-family="ui-monospace,Menlo,monospace" font-size="12.5" font-weight="bold" fill="#f6efe2">QA — three-tier pass</text><text x="34" y="96" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#2e6b34">probed: empty kits array, only-unpublished kit,</text><text x="34" y="120" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#2e6b34">member-flag honesty  ·  defects: none</text><text x="34" y="144" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#2e6b34">TEST VERDICT: pass → rc</text></g><g opacity="0"><animate attributeName="opacity" dur="18.2s" repeatCount="indefinite" calcMode="discrete" keyTimes="0;0.4286;0.5714" values="0;1;0"/><rect x="24" y="52" rx="6" width="218" height="24" fill="#a33327"/><text x="37" y="69" font-family="ui-monospace,Menlo,monospace" font-size="12.5" font-weight="bold" fill="#f6efe2">REVIEW i89 — GATE BLOCKS</text><text x="34" y="96" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#a33327">REVIEW: bounced — multi-line kit copy-block</text><text x="34" y="120" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#a33327">collapses to one unrunnable line</text><text x="34" y="144" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#a33327">✖ does not ship</text></g><g opacity="0"><animate attributeName="opacity" dur="18.2s" repeatCount="indefinite" calcMode="discrete" keyTimes="0;0.5714;0.7143" values="0;1;0"/><rect x="24" y="52" rx="6" width="162" height="24" fill="#8a6d3b"/><text x="37" y="69" font-family="ui-monospace,Menlo,monospace" font-size="12.5" font-weight="bold" fill="#f6efe2">FIX i90 — builder</text><text x="34" y="96" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#221c14">scoped fix: .kit .install{white-space:pre}</text><text x="34" y="120" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#221c14">+ an EXECUTABLE regression pinning the i89 bounce</text></g><g opacity="0"><animate attributeName="opacity" dur="18.2s" repeatCount="indefinite" calcMode="discrete" keyTimes="0;0.7143;0.8571" values="0;1;0"/><rect x="24" y="52" rx="6" width="218" height="24" fill="#2e6b34"/><text x="37" y="69" font-family="ui-monospace,Menlo,monospace" font-size="12.5" font-weight="bold" fill="#f6efe2">RE-TEST i91 · REVIEW i92</text><text x="34" y="96" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#2e6b34">re-test: pass · regression suite green</text><text x="34" y="120" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#2e6b34">REVIEW: approved — bounce cured,</text><text x="34" y="144" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#2e6b34">regression executable, copy honest</text></g><g opacity="0"><animate attributeName="opacity" dur="18.2s" repeatCount="indefinite" calcMode="discrete" keyTimes="0;0.8571" values="0;1"/><rect x="24" y="52" rx="6" width="234" height="24" fill="#1d5c8a"/><text x="37" y="69" font-family="ui-monospace,Menlo,monospace" font-size="12.5" font-weight="bold" fill="#f6efe2">PUBLISHED i93 — maintainer</text><text x="34" y="96" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#1d5c8a">starter-kits v0.1.0 → live on the shelf</text><text x="34" y="120" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#1d5c8a">marketplace.json synced · release tag laid</text><text x="34" y="144" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#1d5c8a">✔ installed users receive it</text></g><text x="24" y="186" font-size="11" fill="#6b5d49">REPLAY · real iterations i89–i93 · every line from foundry/records/starter-kits.md · sped up</text></svg>
